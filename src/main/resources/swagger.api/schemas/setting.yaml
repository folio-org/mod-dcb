SettingsCollection:
    $schema: "http://json-schema.org/draft-04/schema#"
    description: "Collection of settings"
    type: object
    properties:
      items:
        type: array
        items:
            $ref: "setting.yaml#/Setting"
      totalRecords:
        description: "The number of setting records returned in this collection"
        type: integer
    additionalProperties: false
    required: [ items, totalRecords ]

Setting:
  $schema: "http://json-schema.org/draft-04/schema#"
  description: "Setting"
  type: object
  properties:
    id:
      description: "Setting Identifier"
      type: string
      format: uuid
    scope:
      $ref: "setting.yaml#/SettingScope"
    key:
      type: string
      description: "Key within scope for this setting"
    value:
      type: object
      description: "Settings value (any type)"
    _version:
      type: integer
      description: "Record version for optimistic locking"
    metadata:
      $ref: "metadata.json"

  additionalProperties: false
  required: [ id, scope, key, value ]

SettingScope:
    type: string
    description: "Scope for this entry (normally a module)"
    enum:
        - "mod-dcb"
